<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class 10 Science Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Class 10 Science Board Exam Practice</h1>
  <p>Real AI Question Generator</p>

  <select id="chapter">
    <option value="all">All Topics</option>
    <option value="physics">Physics</option>
    <option value="chemistry">Chemistry</option>
    <option value="biology">Biology</option>
  </select>
  <button id="generateBtn">Generate New Question</button>

  <div id="question" style="margin-top:30px; font-size:18px;"></div>
  <div id="options" style="margin-top:20px;"></div>
  <div id="result" style="margin-top:30px; padding:15px; border:2px solid black; display:none;"></div>

  <p>Score: <span id="score">0</span> | Attempted: <span id="attempted">0</span></p>

  <script src="script.js"></script>
</body>
</html>
