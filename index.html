<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class 10 Science Board Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Class 10 Science Board Exam Practice</h1>
      <p>Real AI Question Generator</p>
    </header>

    <div class="controls">
      <select id="chapter">
        <option value="all">All Topics (Mixed)</option>
        <option value="physics">Physics</option>
        <option value="chemistry">Chemistry</option>
        <option value="biology">Biology</option>
      </select>
      <button id="generateBtn">Generate New Question</button>
    </div>

    <div id="questionArea">
      <h2 id="qTitle"></h2>
      <p id="questionText"></p>
      <div id="options"></div>
      <div id="inputArea" style="display:none; margin-top:15px;">
        <input type="text" id="userAnswer" placeholder="Enter your answer" style="width:100%; padding:10px;">
        <button id="submitAnswer" style="margin-top:10px;">Submit Answer</button>
      </div>
    </div>

    <div id="result" style="display:none; margin:20px 0; padding:15px; border:2px solid #333;"></div>

    <div class="stats">
      Score: <span id="score">0</span> | Attempted: <span id="attempted">0</span>
      <button id="nextBtn" style="display:none; margin-left:20px;">Next Question</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
