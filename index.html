<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class 10 Science Board Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Class 10 Science Board Exam Practice</h1>
      <p>AI Powered Question Generator - Physics Chemistry Biology</p>
    </header>

    <div class="controls">
      <select id="chapter">
        <option value="all">All Topics (Mixed)</option>
        <option value="physics">Physics</option>
        <option value="chemistry">Chemistry</option>
        <option value="biology">Biology</option>
      </select>
      
      <input type="text" id="apiKey" placeholder="Optional: xAI / OpenAI API key" style="flex:1;">
      <button id="saveKey">Save Key</button>
      <button id="generateBtn">Generate New Question</button>
    </div>

    <div id="questionArea" class="question-area">
      <h2 id="qTitle"></h2>
      <p id="questionText"></p>
      <div id="options" class="options"></div>
      <div id="inputArea" style="display:none;">
        <input type="text" id="userAnswer" placeholder="Type your answer here">
        <button id="submitAnswer">Submit Answer</button>
      </div>
    </div>

    <div id="result" class="result" style="display:none;"></div>

    <div class="stats">
      <p>Score: <span id="score">0</span> | Attempted: <span id="attempted">0</span></p>
      <button id="nextBtn" style="display:none;">Next Question</button>
    </div>

    <div class="info">
      <small>Leave API key empty to use local generator. Key is saved only in your browser.</small>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
